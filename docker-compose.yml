services:
  mcp-web-dashboard:
    build: .
    container_name: mcp-web-dashboard
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - ./data:/app/data
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # C'est ici le changement : on lance l'application qui gère tout
    command: python3 mcp-web-dashboard/app.py